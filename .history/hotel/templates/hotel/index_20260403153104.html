<!doctype html>
<html lang="hy">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Հյուրանոցի կայք AI օգնականով</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .hero { background: #0d6efd; color: #fff; border-radius: 12px; padding: 2rem; }
    .chat-box {
      height: 320px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: .5rem;
      background: #fff;
      padding: 1rem;
    }
    .msg { margin-bottom: .75rem; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="hero mb-4">
      <h1 class="h3 mb-2">Բարի գալուստ Horizon հյուրանոց</h1>
      <p class="mb-0">Ամրագրեք ձեր իդեալական սենյակը և հարցրեք մեր AI օգնականին սենյակների, հարմարությունների և ամրագրումների մասին։</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header">Մատչելի սենյակներ</div>
          <div class="card-body">
            <div class="row g-3">
              {% for room in rooms %}
                <div class="col-md-6">
                  <div class="border rounded p-3 h-100 bg-white">
                    <h3 class="h6 mb-1">{{ room.name }}</h3>
                    <p class="text-muted mb-1">{{ room.desc }}</p>
                    <strong>{{ room.price }}</strong>
                  </div>
                </div>
              {% endfor %}
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header">AI օգնական</div>
          <div class="card-body">
            <div id="chatBox" class="chat-box mb-3"></div>
            <form id="chatForm" class="row g-2">
              <div class="col-9">
                <input id="messageInput" class="form-control" placeholder="Հարցրեք սենյակների, գների, մուտքի մասին..." required>
              </div>
              <div class="col-3 d-grid">
                <button id="sendBtn" class="btn btn-primary" type="submit">Ուղարկել</button>
              </div>
            </form>
            <small id="statusText" class="text-muted"></small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");
    const statusText = document.getElementById("statusText");

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = "msg";
      el.innerHTML = `<strong>${role}:</strong> ${text}`;
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;

      addMessage("Դուք", message);
      messageInput.value = "";
      sendBtn.disabled = true;
      statusText.textContent = "Օգնականը գրում է...";

      try {
        const response = await fetch("/assistant/chat/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Հարցումը ձախողվեց");
        }
        addMessage("Օգնական", data.response || "(դատարկ պատասխան)");
        statusText.textContent = "";
      } catch (err) {
        addMessage("Օգնական", `Սխալ․ ${err.message}`);
        statusText.textContent = "Հարցումը ձախողվեց։";
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
