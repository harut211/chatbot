<!doctype html>
<html lang="hy">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Հյուրանոցի կայք AI օգնականով</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(12, 25, 42, 0.65), rgba(12, 25, 42, 0.65)),
        url("https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #f8f9fa;
    }
    .hero {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(6px);
      color: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .chat-card {
      background: rgba(255, 255, 255, 0.92);
      border: none;
      border-radius: 14px;
      color: #1f2937;
    }
    .chat-box {
      height: 420px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: .5rem;
      background: #fff;
      padding: 1rem;
    }
    .msg { margin-bottom: .75rem; }
  </style>
</head>
<body>
  <div class="container py-4 py-md-5">
    <div class="hero mb-4 text-center">
      <h1 class="h3 mb-2">Բարի գալուստ Horizon հյուրանոց</h1>
      <p class="mb-0">Խորհրդակցեք և սենյակներ ամրագրեք մեր հյուրանոցում՝ մեր արհեստական ինտելեկտի օգնությամբ։</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-7">
        <div class="card shadow chat-card">
          <div class="card-header fw-semibold">AI օգնական</div>
          <div class="card-body">
            <div id="chatBox" class="chat-box mb-3"></div>
            <form id="chatForm" class="row g-2">
              <div class="col-9">
                <input id="messageInput" class="form-control" placeholder="Հարցրեք սենյակների, գների, ամրագրումների մասին..." required>
              </div>
              <div class="col-3 d-grid">
                <button id="sendBtn" class="btn btn-primary" type="submit">Ուղարկել</button>
              </div>
            </form>
            <small id="statusText" class="text-muted"></small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");
    const statusText = document.getElementById("statusText");

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = "msg";
      el.innerHTML = `<strong>${role}:</strong> ${text}`;
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;

      addMessage("Դուք", message);
      messageInput.value = "";
      sendBtn.disabled = true;
      statusText.textContent = "Օգնականը գրում է...";

      try {
        const response = await fetch("/assistant/chat/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Հարցումը ձախողվեց");
        }
        addMessage("Օգնական", data.response || "(դատարկ պատասխան)");
        statusText.textContent = "";
      } catch (err) {
        addMessage("Օգնական", `Սխալ․ ${err.message}`);
        statusText.textContent = "Հարցումը ձախողվեց։";
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
