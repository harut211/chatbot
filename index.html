<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chatbot UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }
    .chat-card {
      max-width: 800px;
      margin: 32px auto;
    }
    .chat-box {
      height: 420px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 0.5rem;
      padding: 1rem;
    }
    .msg {
      margin-bottom: 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg .label {
      font-size: 0.8rem;
      color: #6c757d;
      margin-bottom: 0.15rem;
      display: block;
    }
    .msg.user {
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card shadow-sm chat-card">
      <div class="card-header bg-primary text-white">
        Chat with Bot
      </div>
      <div class="card-body">
        <div id="chatBox" class="chat-box mb-3"></div>
        <form id="chatForm" class="row g-2">
          <div class="col-9 col-md-10">
            <input
              id="messageInput"
              type="text"
              class="form-control"
              placeholder="Type your message..."
              required
            >
          </div>
          <div class="col-3 col-md-2 d-grid">
            <button id="sendBtn" type="submit" class="btn btn-primary">Send</button>
          </div>
        </form>
        <div id="statusText" class="form-text mt-2"></div>
      </div>
    </div>
  </div>

  <script>
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");
    const statusText = document.getElementById("statusText");

    function addMessage(role, text) {
      const wrapper = document.createElement("div");
      wrapper.className = "msg " + (role === "You" ? "user" : "bot");

      const label = document.createElement("span");
      label.className = "label";
      label.textContent = role;

      const content = document.createElement("div");
      content.className = role === "You" ? "alert alert-primary py-2 px-3 d-inline-block mb-0" : "alert alert-light border py-2 px-3 d-inline-block mb-0";
      content.textContent = text;

      wrapper.appendChild(label);
      wrapper.appendChild(content);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) {
        return;
      }

      addMessage("You", message);
      messageInput.value = "";
      messageInput.focus();
      statusText.textContent = "Bot is typing...";
      sendBtn.disabled = true;
      messageInput.disabled = true;

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const rawBody = await response.text();
        let data = {};
        try {
          data = rawBody ? JSON.parse(rawBody) : {};
        } catch (parseError) {
          data = { detail: rawBody || "Unexpected response from server" };
        }

        if (!response.ok) {
          throw new Error(data.detail || "Request failed");
        }

        addMessage("Bot", data.response || "(empty response)");
        statusText.textContent = "";
      } catch (error) {
        addMessage("Bot", "Error: " + error.message);
        statusText.textContent = "Request failed.";
      } finally {
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    });
  </script>
</body>
</html>
